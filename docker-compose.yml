version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: antiplagiat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: antiplagiat_user
      POSTGRES_PASSWORD: ParolaSecreta123!
      POSTGRES_DB: antiplagiat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U antiplagiat_user -d antiplagiat"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
